<component src="layouts/main.html">
  <h1 class="m-0 text-2xl font-bold leading-tight text-slate-900">
    New release available
  </h1>

  <p class="mb-0 mt-2 text-sm leading-6 text-slate-500">
    A new release of <strong class="font-semibold text-slate-900">{{ repo }}</strong> has shipped.
  </p>

  <div class="mt-5">
    <x-release-badge repo="{{ repo }}" tag="{{ tag }}" />
  </div>

  <p class="mt-7 mb-0">
    <a
      href="https://github.com/{{ repo }}/releases/{{ tag }}"
      class="inline-block rounded-lg bg-slate-900 px-6 py-3 text-sm font-semibold text-white no-underline"
    >
      View release on GitHub
    </a>
  </p>

  <p class="mb-0 mt-8 border-t border-slate-100 pt-6 text-xs leading-5 text-slate-400">
    Don't want these emails?
    <a
      href="{{ unsubscribeUrl }}"
      class="text-slate-500 underline"
    >Unsubscribe from {{ repo }}</a>.
  </p>
</component>
