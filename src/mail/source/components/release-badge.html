<a
  href="https://github.com/{{ repo }}/releases/{{ tag }}"
  class="inline-block no-underline"
>
  <table
    role="presentation"
    cellpadding="0"
    cellspacing="0"
    class="rounded-md border border-slate-200"
  >
    <tr>
      <td
        class="rounded-l-md bg-slate-900 px-3 py-1 text-xs font-semibold text-white"
      >
        {{ repo }}
      </td>
      <td
        class="rounded-r-md bg-emerald-600 px-3 py-1 text-xs font-semibold text-white"
      >
        {{ tag }}
      </td>
    </tr>
  </table>
</a>
