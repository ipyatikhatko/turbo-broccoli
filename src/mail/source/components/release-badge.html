<a
  href="https://github.com/{{ repo }}/releases/{{ tag }}"
  class="inline-block no-underline"
>
  <table
    role="presentation"
    cellpadding="0"
    cellspacing="0"
    class="rounded-lg border border-slate-200"
  >
    <tr>
      <td class="rounded-l-lg bg-slate-900 px-3 py-1.5 text-xs font-semibold text-white">
        {{ repo }}
      </td>
      <td class="rounded-r-lg bg-slate-100 px-3 py-1.5 text-xs font-semibold text-slate-700">
        {{ tag }}
      </td>
    </tr>
  </table>
</a>
