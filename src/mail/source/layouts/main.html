<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Release Notifications</title>
    <style>
      @tailwind utilities;
    </style>
  </head>
  <body class="m-0 bg-slate-50 p-0 font-sans text-slate-900">
    <table
      role="presentation"
      cellpadding="0"
      cellspacing="0"
      width="100%"
      class="bg-slate-50"
    >
      <tr>
        <td align="center" class="px-4 py-10">
          <!-- Card -->
          <table
            role="presentation"
            cellpadding="0"
            cellspacing="0"
            width="580"
            class="w-full max-w-[580px] rounded-2xl border border-slate-200 bg-white"
          >
            <!-- Brand header -->
            <tr>
              <td class="border-b border-slate-100 px-8 py-5">
                <table role="presentation" cellpadding="0" cellspacing="0">
                  <tr>
                    <td class="pr-2" style="line-height: 0">
                      <img
                        src="https://github.githubassets.com/favicons/favicon.png"
                        width="16"
                        height="16"
                        alt="GitHub"
                        style="display: block; border: 0"
                      />
                    </td>
                    <td>
                      <span
                        class="text-xs font-semibold uppercase tracking-widest text-slate-400"
                      >
                        Release notifications
                      </span>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <!-- Content -->
            <tr>
              <td class="px-8 py-8">
                <yield />
              </td>
            </tr>
          </table>

          <!-- Footer -->
          <table
            role="presentation"
            cellpadding="0"
            cellspacing="0"
            width="580"
            class="w-full max-w-[580px]"
          >
            <tr>
              <td align="center" class="px-8 pt-5 pb-2">
                <p class="m-0 text-xs leading-5 text-slate-400">
                  You received this because you subscribed to release
                  notifications.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
