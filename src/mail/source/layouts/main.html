<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Release Notifications</title>
    <style>
      @tailwind utilities;
    </style>
  </head>
  <body class="m-0 bg-slate-50 p-0 font-sans text-slate-900">
    <table
      role="presentation"
      cellpadding="0"
      cellspacing="0"
      width="100%"
      class="bg-slate-50"
    >
      <tr>
        <td align="center" class="px-4 py-10">
          <!-- Card -->
          <table
            role="presentation"
            cellpadding="0"
            cellspacing="0"
            width="580"
            class="w-full max-w-[580px] rounded-2xl border border-slate-200 bg-white"
          >
            <!-- Brand header -->
            <tr>
              <td class="border-b border-slate-100 px-8 py-5">
                <table role="presentation" cellpadding="0" cellspacing="0">
                  <tr>
                    <td class="pr-2">
                      <svg
                        width="16"
                        height="16"
                        viewBox="0 0 24 24"
                        fill="currentColor"
                        class="text-slate-500"
                        style="color: #64748b; display: block"
                      >
                        <path
                          d="M12 2C6.477 2 2 6.484 2 12.021c0 4.428 2.865 8.185 6.839 9.504.5.092.682-.217.682-.483 0-.237-.009-.868-.013-1.703-2.782.605-3.369-1.342-3.369-1.342-.454-1.154-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.031 1.531 1.031.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.026 2.747-1.026.546 1.378.202 2.397.1 2.65.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.942.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.203 22 16.447 22 12.021 22 6.484 17.523 2 12 2z"
                        />
                      </svg>
                    </td>
                    <td>
                      <span
                        class="text-xs font-semibold uppercase tracking-widest text-slate-400"
                      >
                        Release notifications
                      </span>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <!-- Content -->
            <tr>
              <td class="px-8 py-8">
                <yield />
              </td>
            </tr>
          </table>

          <!-- Footer -->
          <table
            role="presentation"
            cellpadding="0"
            cellspacing="0"
            width="580"
            class="w-full max-w-[580px]"
          >
            <tr>
              <td align="center" class="px-8 pt-5 pb-2">
                <p class="m-0 text-xs leading-5 text-slate-400">
                  You received this because you subscribed to release
                  notifications.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
