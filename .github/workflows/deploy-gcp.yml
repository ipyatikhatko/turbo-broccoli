name: Deploy Cloud Run

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g. latest or git sha)"
        required: true
        default: "latest"

permissions:
  contents: read
  id-token: write

env:
  IMAGE_NAME: turbo-broccoli

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy revision
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          REGION: ${{ vars.GCP_REGION }}
          AR_REPO: ${{ vars.GCP_ARTIFACT_REGISTRY_REPOSITORY }}
          SERVICE: ${{ vars.CLOUD_RUN_SERVICE }}
          TAG: ${{ github.event.inputs.image_tag }}
        run: |
          set -euo pipefail
          REPO="${AR_REPO:-turbo-brocoli-api}"
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/${IMAGE_NAME}:${TAG}"
          gcloud run deploy "${SERVICE}" \
            --image "${IMAGE}" \
            --region "${REGION}" \
            --platform managed \
            --quiet
